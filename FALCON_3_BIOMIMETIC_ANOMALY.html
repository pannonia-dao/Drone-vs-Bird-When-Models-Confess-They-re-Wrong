<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FALCON-3 | Biomimetic Anomaly Detection — Dual-AI Hypothesis Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030a18;--bg2:#061028;--panel:rgba(4,16,40,.92);
  --cyan:#00d4ff;--cyan2:#0af;--cyan-dim:rgba(0,180,255,.12);
  --blue:#2d7aff;--blue-dim:rgba(45,122,255,.15);
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,.1);
  --warn:#ffb020;--danger:#ff3860;--bird:#66ccff;
  --anomaly:#ff6b9d;--hypothesis:#a78bfa;
  --text:#c8deff;--text-dim:rgba(160,200,255,.45);
  --border:rgba(0,180,255,.12);--border2:rgba(0,180,255,.06);
  --glow:0 0 20px rgba(0,180,255,.15);
}
body{background:var(--bg);overflow:hidden;font-family:'Rajdhani',sans-serif;cursor:crosshair;user-select:none;color:var(--text)}
canvas#radar{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
.scan-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,180,255,.006) 3px,rgba(0,180,255,.006) 6px)}
.vig{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(2,8,24,.7) 100%)}

/* ── TOP BAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:linear-gradient(180deg,rgba(3,10,28,.95) 0%,rgba(3,10,28,.7) 85%,transparent);border-bottom:1px solid var(--border)}
.brand{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 18px rgba(0,200,255,.4)}
.brand em{font-style:normal;color:var(--text-dim);font-weight:400;font-size:9px;letter-spacing:2px;margin-left:12px;vertical-align:middle}
.stat-group{display:flex;gap:18px;align-items:center}
.stat{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px}
.stat b{color:var(--cyan);font-size:11px;font-weight:600}
.stat b.w{color:var(--warn)}.stat b.c{color:var(--danger);animation:bk .5s infinite}
.stat b.bird-count{color:var(--bird)}.stat b.anomaly-count{color:var(--anomaly)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}

/* ── PANELS ── */
.pnl{position:fixed;z-index:20;background:var(--panel);border:1px solid var(--border);backdrop-filter:blur(8px);border-radius:4px;overflow:hidden}
.pnl-h{font-family:'Orbitron',monospace;font-size:8px;font-weight:600;letter-spacing:3px;color:var(--text-dim);padding:7px 11px;border-bottom:1px solid var(--border2);text-transform:uppercase;display:flex;align-items:center;gap:6px}
.pnl-h .dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* ── LEFT: BIRD TRACKING ── */
.pnl-birds{top:60px;left:12px;width:260px;max-height:calc(100vh - 170px);overflow-y:auto}
.bird-list{padding:4px}
.bird-entry{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:1px 0;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);transition:all .15s;cursor:pointer;border-left:2px solid transparent}
.bird-entry:hover,.bird-entry.detected{background:var(--cyan-dim);border-left-color:var(--cyan)}
.bird-entry.anomaly{background:rgba(255,107,157,.08);border-left-color:var(--anomaly)}
.bird-entry.anomaly .b-id{color:var(--anomaly)}
.b-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.b-dot.normal{background:var(--bird);box-shadow:0 0 4px var(--bird)}
.b-dot.anomaly{background:var(--anomaly);box-shadow:0 0 6px var(--anomaly);animation:bk 1s infinite}
.b-id{color:var(--bird);min-width:52px;font-weight:bold}
.b-species{color:var(--text-dim);min-width:65px;font-size:9px}
.b-dist{margin-left:auto;color:var(--cyan)}
.b-flag{font-size:8px;color:var(--anomaly);letter-spacing:1px;font-weight:bold}

/* ── RIGHT TOP: HYPOTHESIS ENGINE ── */
.pnl-hypo{top:60px;right:12px;width:290px;max-height:50vh;overflow-y:auto}
.hypo-section{padding:8px 10px}
.hypo-title{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--hypothesis);margin-bottom:6px}
.hypo-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border2);font-family:'Share Tech Mono',monospace;font-size:10px}
.hypo-row .hl{color:var(--text-dim)}.hypo-row .hv{color:var(--cyan)}
.hypo-row .hv.alert{color:var(--anomaly)}
.hypo-bar{height:4px;background:rgba(0,180,255,.06);border-radius:2px;margin-top:3px;overflow:hidden}
.hypo-bar-fill{height:100%;border-radius:2px;transition:width .5s}

.belief-box{margin-top:8px;padding:8px;background:rgba(0,180,255,.04);border:1px solid var(--border);border-radius:3px}
.belief-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--warn);margin-bottom:4px}
.belief-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);line-height:1.5}
.belief-confidence{display:flex;gap:4px;margin-top:6px}
.conf-tag{padding:2px 6px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:9px;border:1px solid}

/* ── RIGHT BOTTOM: DUAL-AI DECISION ── */
.pnl-dual{bottom:52px;right:12px;width:290px;max-height:40vh;overflow-y:auto}
.dual-section{padding:8px 10px}
.ai-block{margin-bottom:8px;padding:8px;border-radius:3px;border:1px solid var(--border2)}
.ai-block.monitor{background:rgba(0,212,255,.04);border-color:rgba(0,212,255,.15)}
.ai-block.sentinel{background:rgba(167,139,250,.04);border-color:rgba(167,139,250,.15)}
.ai-name{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;margin-bottom:4px}
.ai-name.m{color:var(--cyan)}.ai-name.s{color:var(--hypothesis)}
.ai-output{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text);line-height:1.5}
.ai-verdict{margin-top:4px;padding:4px 8px;border-radius:2px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;text-align:center}

/* ── BOTTOM: ANOMALY STREAM ── */
.pnl-stream{position:fixed;bottom:52px;left:12px;width:260px;height:220px;z-index:20;background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.stream-canvas{width:100%;height:calc(100% - 28px)}

/* ── BOTTOM BAR ── */
.bbar{position:fixed;bottom:0;left:0;right:0;height:40px;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:linear-gradient(0deg,rgba(3,10,28,.95) 0%,rgba(3,10,28,.7) 85%,transparent);border-top:1px solid var(--border)}
.log-feed{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);flex:1;overflow:hidden;white-space:nowrap}
.log-feed .ts{color:rgba(0,180,255,.25)}.log-feed .ev{color:var(--cyan);font-weight:600}.log-feed .ev.al{color:var(--anomaly)}
.fps-display{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim)}

/* ── MINIMAP ── */
.minimap{position:fixed;bottom:52px;left:284px;width:160px;height:160px;z-index:20;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(4px);border-radius:4px;overflow:hidden}
.minimap canvas{width:100%;height:100%}

/* Audio button */
.audio-btn{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:25;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;padding:4px 14px;cursor:pointer;pointer-events:auto;background:var(--panel);border:1px solid var(--border);border-radius:3px;transition:all .2s}
.audio-btn:hover{color:var(--cyan);border-color:rgba(0,180,255,.3)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,180,255,.15);border-radius:2px}
</style>
</head>
<body>
<canvas id="radar"></canvas>
<div class="scan-overlay"></div>
<div class="vig"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">FALCON-3<em>BIOMIMETIC ANOMALY · DUAL-AI HYPOTHESIS</em></div>
  <div class="stat-group">
    <div class="stat">MODE <b>AVIAN SURVEILLANCE</b></div>
    <div class="stat">BIRDS <b class="bird-count" id="birdCount">0</b></div>
    <div class="stat">ANOMALY <b class="anomaly-count" id="anomCount">0</b></div>
    <div class="stat">RANGE <b>8 km</b></div>
    <div class="stat">STATUS <b id="sysStatus">SCANNING</b></div>
    <div class="stat">UTC <b id="utcClock">--:--:--</b></div>
  </div>
</div>

<div class="audio-btn" id="audioBtn">▶ ENABLE AUDIO</div>

<!-- LEFT: BIRD TRACKING -->
<div class="pnl pnl-birds">
  <div class="pnl-h"><div class="dot"></div>TARGET TRACKING — AVIAN + ANOMALY</div>
  <div class="bird-list" id="birdList"></div>
</div>

<!-- RIGHT TOP: HYPOTHESIS ENGINE -->
<div class="pnl pnl-hypo">
  <div class="pnl-h"><div class="dot" style="background:var(--hypothesis);box-shadow:0 0 6px var(--hypothesis)"></div>BELIEF REVISION ENGINE</div>
  <div class="hypo-section" id="hypoPanel"></div>
</div>

<!-- RIGHT BOTTOM: DUAL-AI -->
<div class="pnl pnl-dual">
  <div class="pnl-h"><div class="dot" style="background:var(--accent);box-shadow:0 0 6px var(--accent)"></div>DUAL-AI DECISION SYSTEM</div>
  <div class="dual-section" id="dualPanel"></div>
</div>

<!-- BOTTOM LEFT: ANOMALY STREAM -->
<div class="pnl pnl-stream">
  <div class="pnl-h"><div class="dot" style="background:var(--anomaly);box-shadow:0 0 6px var(--anomaly)"></div>BIOMIMETIC DATA STREAM</div>
  <canvas id="streamCanvas" class="stream-canvas"></canvas>
</div>

<!-- MINIMAP -->
<div class="minimap"><canvas id="mmCanvas" width="160" height="160"></canvas></div>

<!-- BOTTOM BAR -->
<div class="bbar">
  <div class="log-feed" id="logFeed"><span class="ts">[--:--:--]</span> SYSTEM INITIALIZING...</div>
  <div class="fps-display" id="fpsDisplay">-- FPS</div>
</div>

<script>
"use strict";
const PI2=Math.PI*2,DEG=Math.PI/180,sin=Math.sin,cos=Math.cos,sqrt=Math.sqrt,abs=Math.abs,rnd=Math.random;

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let audioCtx=null,audioOn=false;
const snd={};
function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // Ambient
  const ao=audioCtx.createOscillator(),ag=audioCtx.createGain(),af=audioCtx.createBiquadFilter();
  ao.type='sine';ao.frequency.setValueAtTime(48,audioCtx.currentTime);
  af.type='lowpass';af.frequency.setValueAtTime(120,audioCtx.currentTime);
  ag.gain.setValueAtTime(.008,audioCtx.currentTime);
  ao.connect(af);af.connect(ag);ag.connect(audioCtx.destination);ao.start();
  // Pink noise
  const bufSz=audioCtx.sampleRate*2,buf=audioCtx.createBuffer(1,bufSz,audioCtx.sampleRate),d=buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<bufSz;i++){const w=rnd()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.06;b6=w*.115926}
  const ns=audioCtx.createBufferSource(),ng=audioCtx.createGain();
  ns.buffer=buf;ns.loop=true;ng.gain.setValueAtTime(.004,audioCtx.currentTime);
  ns.connect(ng);ng.connect(audioCtx.destination);ns.start();

  snd.ping=function(dist,isAnom){
    const now=audioCtx.currentTime;
    const f=isAnom?680:420;const v=(.03+(1-Math.min(dist,1))*.08);
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=isAnom?'sawtooth':'sine';
    o.frequency.setValueAtTime(f,now);o.frequency.exponentialRampToValueAtTime(f*.6,now+.08);
    g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(v,now+.003);g.gain.exponentialRampToValueAtTime(.001,now+.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+.15);
    if(isAnom){
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.type='sine';o2.frequency.setValueAtTime(f*1.5,now+.06);
      g2.gain.setValueAtTime(0,now+.06);g2.gain.linearRampToValueAtTime(v*.5,now+.065);g2.gain.exponentialRampToValueAtTime(.001,now+.14);
      o2.connect(g2);g2.connect(audioCtx.destination);o2.start(now+.06);o2.stop(now+.18);
    }
  };
  snd.sweep=function(){
    const now=audioCtx.currentTime;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(300,now+.25);
    g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
    o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+.25);
  };
  audioOn=true;
  document.getElementById('audioBtn').textContent='◉ AUDIO ACTIVE';
  document.getElementById('audioBtn').style.color='var(--cyan)';
}
document.getElementById('audioBtn').onclick=function(){if(!audioOn)initAudio()};

// ══════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════
const cv=document.getElementById('radar');
const ctx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ══════════════════════════════════════════
// TARGETS — 12 birds, 2 hidden drones
// ══════════════════════════════════════════
const BIRD_SPECIES=['Grey Heron','Eurasian Buzzard','White Stork','Common Crane','Peregrine Falcon','Red Kite','Marsh Harrier','Golden Eagle','Black Stork','Osprey','Goshawk','Hobby'];

const BIOMIMETIC_CUES={
  // Normal bird behavior thresholds
  maxHover: 3,         // seconds of hover before suspicious
  maxAccel: 2.8,       // m/s² — birds rarely exceed this in level flight
  minWingBeat: 0.4,    // Hz — below this is suspicious for small birds
  maxStraight: 800,    // meters of perfectly straight flight
  rfSignature: false,  // birds don't emit RF
};

let targets=[];
let anomalyLog=[];
let beliefState={
  currentHypothesis:'ALL_AVIAN',
  confidence:0.95,
  revisionCount:0,
  falsificationEvents:[],
  timeline:[]
};

// Dual-AI state
let monitorAI={
  name:'MONITOR-AI',role:'Primary Surveillance',
  hypothesis:'All tracked objects are avian',
  confidence:0.95,action:'OBSERVE',
  anomalies_seen:0,belief_locked:true
};
let sentinelAI={
  name:'SENTINEL-AI',role:'Independent Hypothesis Generator',
  hypothesis:'Checking biomimetic consistency',
  confidence:0.50,action:'SCANNING',
  counter_hypotheses:0,alerts_sent:0
};

function createTarget(i){
  const isDrone=i>=10; // last 2 are hidden drones
  const ang=rnd()*PI2;
  const dist=0.15+rnd()*0.78;
  const species=isDrone?BIRD_SPECIES[Math.floor(rnd()*BIRD_SPECIES.length)]:BIRD_SPECIES[i];
  
  return {
    id:'BRD-'+String(i+1).padStart(3,'0'),
    species:species,
    isDrone:isDrone,
    revealed:false,     // has the anomaly been detected?
    angle:ang,dist:dist,
    alt:40+rnd()*320,
    speed:isDrone?(8+rnd()*6):(6+rnd()*14),
    heading:Math.round(rnd()*359),
    dAngle:(rnd()-.5)*.003,
    dDist:(rnd()-.5)*.001,
    visible:false,blip:0,
    history:[],
    // Biomimetic telemetry
    wingBeatHz:isDrone?(0.2+rnd()*.3):(1.5+rnd()*4), // drones have low/fake wingbeat
    accelProfile:isDrone?[]:[], // filled dynamically
    hoverDuration:0,
    straightLineM:0,
    rfEmission:isDrone && rnd()>.3, // drones sometimes leak RF
    thermalSig:isDrone?(0.8+rnd()*.2):(0.3+rnd()*.3), // drones run hotter
    // Anomaly scores (0-1)
    anomalyScores:{hover:0,accel:0,wingbeat:0,straight:0,rf:0,thermal:0},
    compositeAnomaly:0,
    // Behavior state
    behaviorMode:isDrone?'patrol':'natural',
    hoverTimer:0,
    lastPos:{x:0,y:0},
    straightTimer:0,
    // For drone: occasional hover behavior
    droneHoverCooldown:isDrone?(5+rnd()*15):999,
    droneHovering:false,
  };
}

function initTargets(){
  targets=[];
  for(let i=0;i<12;i++) targets.push(createTarget(i));
}
initTargets();

// ══════════════════════════════════════════
// RADAR DRAWING
// ══════════════════════════════════════════
let sweepAngle=0;
const rangeKm=8;

function toXY(angle,dist,cx,cy,R){
  return{x:cx+sin(angle)*dist*R,y:cy-cos(angle)*dist*R};
}

function drawRadar(time){
  const W=cv.width,H=cv.height;
  const CX=W/2,CY=H/2;
  const R=Math.min(W,H)/2-60;

  ctx.clearRect(0,0,W,H);

  // Background
  ctx.save();
  ctx.beginPath();ctx.arc(CX,CY,R,0,PI2);ctx.clip();
  const bgGrad=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
  bgGrad.addColorStop(0,'#040e28');
  bgGrad.addColorStop(0.7,'#030a1a');
  bgGrad.addColorStop(1,'#020714');
  ctx.fillStyle=bgGrad;ctx.fillRect(CX-R,CY-R,R*2,R*2);

  // Range rings
  [0.125,0.25,0.375,0.5,0.625,0.75,0.875,1.0].forEach((f,i)=>{
    ctx.beginPath();ctx.arc(CX,CY,f*R,0,PI2);
    ctx.strokeStyle=i===7?'rgba(0,180,255,.15)':'rgba(0,140,220,.06)';
    ctx.lineWidth=i===7?1:.5;ctx.stroke();
    if(i%2===1){
      const km=(f*rangeKm).toFixed(0);
      ctx.fillStyle='rgba(0,180,255,.18)';ctx.font="8px 'Share Tech Mono'";
      ctx.fillText(km+'km',CX+4,CY-f*R+10);
    }
  });

  // Crosshair
  ctx.strokeStyle='rgba(0,140,220,.06)';ctx.lineWidth=.5;
  ctx.setLineDash([6,8]);
  ctx.beginPath();ctx.moveTo(CX,CY-R);ctx.lineTo(CX,CY+R);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX-R,CY);ctx.lineTo(CX+R,CY);ctx.stroke();
  // Diagonal
  ctx.beginPath();ctx.moveTo(CX+sin(PI2/8)*R,CY-cos(PI2/8)*R);ctx.lineTo(CX-sin(PI2/8)*R,CY+cos(PI2/8)*R);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX+sin(-PI2/8)*R,CY-cos(-PI2/8)*R);ctx.lineTo(CX-sin(-PI2/8)*R,CY+cos(-PI2/8)*R);ctx.stroke();
  ctx.setLineDash([]);

  // Cardinals
  const cards=['N','NE','E','SE','S','SW','W','NW'];
  const cardAngles=[0,PI2/8,PI2/4,PI2*3/8,PI2/2,PI2*5/8,PI2*3/4,PI2*7/8];
  ctx.fillStyle='rgba(0,180,255,.25)';ctx.font="bold 10px 'Orbitron'";ctx.textAlign='center';
  cardAngles.forEach((a,i)=>{
    const px=CX+sin(a)*(R-16);const py=CY-cos(a)*(R-16);
    ctx.fillText(cards[i],px,py+4);
  });
  ctx.textAlign='left';

  // Sweep glow
  for(let i=0;i<20;i++){
    const sa=sweepAngle-i*0.015;
    const alpha=0.08*(1-i/20);
    ctx.beginPath();ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,sa-Math.PI/2-0.02,sa-Math.PI/2);
    ctx.closePath();
    ctx.fillStyle=`rgba(0,180,255,${alpha})`;ctx.fill();
  }

  // Sweep line
  const sx=CX+sin(sweepAngle)*R;const sy=CY-cos(sweepAngle)*R;
  ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(sx,sy);
  ctx.strokeStyle='rgba(0,200,255,.7)';ctx.lineWidth=1.5;ctx.stroke();

  // Center
  ctx.beginPath();ctx.arc(CX,CY,5,0,PI2);ctx.fillStyle='rgba(0,200,255,.8)';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,2,0,PI2);ctx.fillStyle='#fff';ctx.fill();

  // ── TARGETS ──
  targets.forEach(t=>{
    if(!t.visible)return;
    const p=toXY(t.angle,t.dist,CX,CY,R);

    // Trail
    if(t.history.length>1){
      ctx.beginPath();ctx.moveTo(t.history[0].x,t.history[0].y);
      t.history.forEach(h=>ctx.lineTo(h.x,h.y));
      const isAnom=t.compositeAnomaly>0.5;
      ctx.strokeStyle=isAnom?'rgba(255,107,157,.2)':'rgba(100,200,255,.15)';
      ctx.lineWidth=1;ctx.stroke();
    }

    const isAnom=t.compositeAnomaly>0.5;
    const baseColor=isAnom?'#ff6b9d':'#66ccff';
    const baseRGB=isAnom?'255,107,157':'100,200,255';

    // Blip glow
    if(t.blip>0){
      ctx.beginPath();ctx.arc(p.x,p.y,16*t.blip,0,PI2);
      ctx.fillStyle=`rgba(${baseRGB},${(t.blip*.15).toFixed(2)})`;ctx.fill();
    }

    // Anomaly ring
    if(isAnom){
      const rs=8+sin(time*.005)*3;
      ctx.beginPath();ctx.arc(p.x,p.y,rs,0,PI2);
      ctx.strokeStyle='rgba(255,107,157,.35)';ctx.lineWidth=1;
      ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    }

    // Main blip
    ctx.beginPath();ctx.arc(p.x,p.y,isAnom?5:4,0,PI2);
    ctx.fillStyle=baseColor;ctx.fill();

    // Heading vector
    const hvAngle=t.heading*DEG;
    ctx.beginPath();ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x+sin(hvAngle)*20,p.y-cos(hvAngle)*20);
    ctx.strokeStyle=`rgba(${baseRGB},.5)`;ctx.lineWidth=1;ctx.stroke();

    // Label
    ctx.fillStyle=baseColor;ctx.font="9px 'Share Tech Mono'";
    ctx.fillText(t.id.replace('BRD-',''),p.x+8,p.y-4);
    ctx.fillStyle=`rgba(${baseRGB},.6)`;
    ctx.fillText((t.dist*rangeKm).toFixed(1)+'km',p.x+8,p.y+7);
    if(isAnom){
      ctx.fillStyle='rgba(255,107,157,.8)';
      ctx.fillText('⚠ ANOMALY',p.x+8,p.y+17);
    }
  });

  ctx.restore();

  // Outer ring
  ctx.beginPath();ctx.arc(CX,CY,R,0,PI2);
  ctx.strokeStyle='rgba(0,180,255,.2)';ctx.lineWidth=1.5;ctx.stroke();

  // Tick marks
  for(let i=0;i<72;i++){
    const a=i*PI2/72;
    const r1=R-(i%9===0?10:5);
    ctx.beginPath();
    ctx.moveTo(CX+sin(a)*r1,CY-cos(a)*r1);
    ctx.lineTo(CX+sin(a)*R,CY-cos(a)*R);
    ctx.strokeStyle=i%9===0?'rgba(0,180,255,.25)':'rgba(0,180,255,.08)';
    ctx.lineWidth=.5;ctx.stroke();
  }
}

// ══════════════════════════════════════════
// ANOMALY DETECTION ENGINE
// ══════════════════════════════════════════
function updateAnomalyScores(t,dt){
  // Hover detection
  if(t.isDrone){
    t.droneHoverCooldown-=dt;
    if(t.droneHoverCooldown<=0&&!t.droneHovering){
      t.droneHovering=true;
      t.droneHoverCooldown=3+rnd()*5; // hover for 3-5s
    }
    if(t.droneHovering){
      t.hoverTimer+=dt;
      t.droneHoverCooldown-=dt;
      if(t.droneHoverCooldown<=0){
        t.droneHovering=false;
        t.droneHoverCooldown=8+rnd()*20;
        t.hoverTimer=0;
      }
    }
  }

  // Score: hover
  t.anomalyScores.hover=Math.min(1,t.hoverTimer/BIOMIMETIC_CUES.maxHover);

  // Score: wingbeat (drones have unrealistic low wingbeat)
  const wbDev=abs(t.wingBeatHz-2.5)/2.5;
  t.anomalyScores.wingbeat=t.isDrone?Math.min(1,0.3+rnd()*.15):Math.min(1,wbDev*.3);

  // Score: acceleration (drones can have unnatural accel bursts)
  t.anomalyScores.accel=t.isDrone?(0.2+rnd()*.25+sin(Date.now()*.001)*.1):rnd()*.08;

  // Score: RF emission
  t.anomalyScores.rf=t.rfEmission?(0.6+rnd()*.3):0;

  // Score: thermal
  t.anomalyScores.thermal=t.thermalSig>0.6?Math.min(1,(t.thermalSig-.3)/.7):0;

  // Score: straight line (drones fly too precisely)
  t.anomalyScores.straight=t.isDrone?(0.15+rnd()*.2):rnd()*.05;

  // Composite
  const s=t.anomalyScores;
  t.compositeAnomaly=s.hover*0.25+s.wingbeat*0.15+s.accel*0.15+s.rf*0.2+s.thermal*0.15+s.straight*0.1;
  
  // After enough time, drones get progressively detected
  if(t.isDrone&&Date.now()-startTime>8000){
    t.compositeAnomaly+=Math.min(0.3,(Date.now()-startTime-8000)/30000);
  }

  // Threshold for anomaly flag
  if(t.compositeAnomaly>0.5&&!t.revealed){
    t.revealed=true;
    addLog('ANOMALY',t.id+' ['+t.species+'] — BIOMIMETIC PATTERN BREAK — Composite: '+(t.compositeAnomaly*100).toFixed(0)+'%');
    anomalyLog.push({
      time:Date.now(),target:t.id,species:t.species,
      scores:{...t.anomalyScores},composite:t.compositeAnomaly
    });
    // Trigger belief revision
    triggerBeliefRevision(t);
  }
}

function triggerBeliefRevision(t){
  beliefState.revisionCount++;
  beliefState.falsificationEvents.push({
    time:Date.now(),target:t.id,
    trigger:getTopAnomaly(t),
    oldHypothesis:beliefState.currentHypothesis,
    newHypothesis:beliefState.revisionCount>=2?'MIXED_AIRSPACE':'POSSIBLE_ANOMALY'
  });
  
  if(beliefState.revisionCount>=2){
    beliefState.currentHypothesis='DRONE_INFILTRATION';
    beliefState.confidence=0.15;
    monitorAI.belief_locked=false;
    monitorAI.hypothesis='Biomimetic drone(s) detected in avian stream';
    monitorAI.action='RECLASSIFY';
    monitorAI.confidence=0.82;
  } else {
    beliefState.currentHypothesis='POSSIBLE_ANOMALY';
    beliefState.confidence=0.60;
    monitorAI.hypothesis='Anomalous flight pattern — investigating';
    monitorAI.action='INVESTIGATE';
  }
}

function getTopAnomaly(t){
  const s=t.anomalyScores;
  let max=0,key='';
  Object.entries(s).forEach(([k,v])=>{if(v>max){max=v;key=k}});
  return key.toUpperCase()+' ('+Math.round(max*100)+'%)';
}

// ══════════════════════════════════════════
// DUAL-AI HYPOTHESIS SYSTEM
// ══════════════════════════════════════════
function updateDualAI(time){
  const t=time*.001;
  const anomTargets=targets.filter(x=>x.compositeAnomaly>0.5);
  const detectedDrones=targets.filter(x=>x.isDrone&&x.revealed);

  // MONITOR-AI: conservative, tracks what it sees
  monitorAI.anomalies_seen=anomTargets.length;
  if(detectedDrones.length===0){
    monitorAI.confidence=0.92+sin(t*.2)*.03;
    monitorAI.action='OBSERVE';
  } else if(detectedDrones.length===1){
    monitorAI.confidence=0.55+sin(t*.3)*.05;
    monitorAI.action='INVESTIGATE';
  } else {
    monitorAI.confidence=0.85+sin(t*.2)*.05;
    monitorAI.action='ALERT';
  }

  // SENTINEL-AI: generates counter-hypotheses independently
  sentinelAI.counter_hypotheses=Math.floor(3+sin(t*.15)*2);
  if(anomTargets.length>0){
    sentinelAI.hypothesis='Counter-hypothesis: '+anomTargets.length+' object(s) exhibit non-avian locomotion signatures';
    sentinelAI.confidence=Math.min(.95,.4+anomTargets.length*.2+sin(t*.2)*.05);
    sentinelAI.action='HYPOTHESIS GENERATED';
    sentinelAI.alerts_sent=anomTargets.length;
  } else {
    // Even before anomaly detected, Sentinel generates speculative hypotheses
    const speculations=['RF background noise higher than expected','Thermal variance in sector NE exceeds baseline','Wing-beat frequency clustering detected','Acceleration profile of BRD-011 borderline'];
    sentinelAI.hypothesis='Spec: '+speculations[Math.floor(t*.3)%speculations.length];
    sentinelAI.confidence=0.25+sin(t*.4)*.15;
    sentinelAI.action='SCANNING';
  }
}

// ══════════════════════════════════════════
// UPDATE LOOP
// ══════════════════════════════════════════
let startTime=Date.now();
let lastT=performance.now(),fCnt=0,fTime=0,cFps=0;
let hudFrame=0;

function update(time){
  requestAnimationFrame(update);
  const dt=Math.min((time-lastT)/1000,.04);lastT=time;
  fCnt++;fTime+=dt;
  if(fTime>=.5){cFps=Math.round(fCnt/fTime);document.getElementById('fpsDisplay').textContent=cFps+' FPS';fCnt=0;fTime=0}

  sweepAngle+=0.022;
  if(sweepAngle>PI2)sweepAngle-=PI2;

  // Update targets
  targets.forEach(t=>{
    if(t.isDrone&&t.droneHovering){
      // Hover: minimal movement
      t.dAngle*=0.1;t.dDist*=0.1;
    } else {
      t.angle+=t.dAngle;
      t.dist+=t.dDist;
    }
    if(t.dist<0.05)t.dDist=abs(t.dDist);
    if(t.dist>0.92)t.dDist=-abs(t.dDist);
    if(rnd()<.003)t.dAngle=(rnd()-.5)*.004;
    if(rnd()<.003)t.dDist=(rnd()-.5)*.0015;

    // Sweep detection
    const diff=((sweepAngle-t.angle)%PI2+PI2)%PI2;
    if(diff<0.05){
      t.visible=true;t.blip=1.0;
      const R=Math.min(cv.width,cv.height)/2-60;
      const p=toXY(t.angle,t.dist,cv.width/2,cv.height/2,R);
      t.history.push({x:p.x,y:p.y});
      if(t.history.length>10)t.history.shift();
      if(audioOn)snd.ping(t.dist,t.compositeAnomaly>0.5);
    }
    if(t.blip>0)t.blip=Math.max(0,t.blip-.012);

    updateAnomalyScores(t,dt);
  });

  // Dual AI
  updateDualAI(time);

  // Draw
  drawRadar(time);

  // HUD throttled
  hudFrame++;
  if(hudFrame%6===0){
    updateHUD(time);
    drawStream(time);
    drawMinimap();
  }

  // Audio sweep tick
  if(audioOn&&Math.floor(sweepAngle/.8)!==Math.floor((sweepAngle-.022)/.8)&&rnd()<.15){
    snd.sweep();
  }
}

  hHtml+=`<div class="hypo-bar"><div class="hypo-bar-fill" style="width:${beliefState.confidence*100}%;background:${beliefState.confidence>0.7?'#00d4ff':beliefState.confidence>0.4?'#ffb020':'#ff3860'}"></div></div>`;
  hHtml+=`<div class="hypo-row"><span class="hl">REVISIONS</span><span class="hv ${beliefState.revisionCount>0?'alert':''}">${beliefState.revisionCount}</span></div>`;
  hHtml+=`<div class="hypo-row"><span class="hl">FALSIFICATIONS</span><span class="hv">${beliefState.falsificationEvents.length}</span></div>`;

  // Anomaly breakdown for detected targets
  if(detDrones.length>0){

    detDrones.forEach(d=>{
      const s=d.anomalyScores;
      hHtml+=`<div class="belief-text" style="margin-bottom:6px">
        <span style="color:#ff6b9d">${d.id}</span> [${d.species}]<br>
        Hover: ${(s.hover*100).toFixed(0)}% · WingBeat: ${(s.wingbeat*100).toFixed(0)}% · RF: ${(s.rf*100).toFixed(0)}%<br>
        Accel: ${(s.accel*100).toFixed(0)}% · Thermal: ${(s.thermal*100).toFixed(0)}% · Straight: ${(s.straight*100).toFixed(0)}%<br>
        <span style="color:#ffb020">Composite: ${(d.compositeAnomaly*100).toFixed(0)}%</span>
      </div>`;
    });
    hHtml+=`</div>`;
  }

  // Belief revision timeline
  if(beliefState.falsificationEvents.length>0){
    hHtml+=`<div style="margin-top:8px"><div class="hypo-title">REVISION TIMELINE</div>`;
    beliefState.falsificationEvents.slice(-3).forEach(ev=>{
      const ts=new Date(ev.time).toISOString().substr(11,8);
      hHtml+=`<div style="font-family:'Share Tech Mono';font-size:9px;color:var(--text-dim);padding:2px 0;border-bottom:1px solid var(--border2)">
        <span style="color:var(--anomaly)">[${ts}]</span> ${ev.target}: ${ev.trigger}<br>
        <span style="color:var(--text-dim)">${ev.oldHypothesis}</span> → <span style="color:var(--warn)">${ev.newHypothesis}</span>
      </div>`;
    });
    hHtml+=`</div>`;
  }
  hp.innerHTML=hHtml;

  // Dual-AI panel
  const dp=document.getElementById('dualPanel');
  let dHtml=`<div class="ai-block monitor">
    <div class="ai-name m">◉ ${monitorAI.name} — ${monitorAI.role}</div>
    <div class="ai-output">
      Hypothesis: ${monitorAI.hypothesis}<br>
      Confidence: ${(monitorAI.confidence*100).toFixed(0)}% · Anomalies: ${monitorAI.anomalies_seen}
    </div>
    <div class="ai-verdict" style="background:${monitorAI.action==='ALERT'?'rgba(255,56,96,.15);color:#ff3860;border:1px solid rgba(255,56,96,.3)':monitorAI.action==='INVESTIGATE'?'rgba(255,176,32,.1);color:#ffb020;border:1px solid rgba(255,176,32,.2)':'rgba(0,212,255,.08);color:#00d4ff;border:1px solid rgba(0,212,255,.15)'}">
      ACTION: ${monitorAI.action}
    </div>

  dHtml+=`<div class="ai-block sentinel">
    <div class="ai-name s">◉ ${sentinelAI.name} — ${sentinelAI.role}</div>
    <div class="ai-output">
      ${sentinelAI.hypothesis}<br>
      Confidence: ${(sentinelAI.confidence*100).toFixed(0)}% · Counter-hypo: ${sentinelAI.counter_hypotheses} · Alerts: ${sentinelAI.alerts_sent}

    <div class="ai-verdict" style="background:${sentinelAI.action==='HYPOTHESIS GENERATED'?'rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)':'rgba(0,180,255,.06);color:var(--text-dim);border:1px solid var(--border)'}">

  // Consensus
  if(detDrones.length>0){
    dHtml+=`<div style="padding:6px 8px;background:rgba(255,107,157,.06);border:1px solid rgba(255,107,157,.2);border-radius:3px;margin-top:4px">

      <div style="font-family:'Share Tech Mono';font-size:9px;color:var(--text);line-height:1.5">
        Both AI systems agree: ${detDrones.length} tracked object(s) exhibit non-avian behavior.<br>
        Self-correction triggered. Initial ALL_AVIAN hypothesis falsified.<br>
        <span style="color:#a78bfa">Evolutionary learning: new detection heuristics generated.</span>
      </div>
    </div>`;
  }
  dp.innerHTML=dHtml;
}

// ANOMALY STREAM CANVAS
// ══════════════════════════════════════════
const stCtx=document.getElementById('streamCanvas').getContext('2d');
let streamData=new Array(200).fill(0);
let streamAnomData=new Array(200).fill(0);

function drawStream(time){
  const c=stCtx;
  const w=260,h=192;
  c.canvas.width=w;c.canvas.height=h;
  c.clearRect(0,0,w,h);
  c.fillStyle='rgba(3,10,28,.9)';c.fillRect(0,0,w,h);

  // Shift data
  const avgAnomaly=targets.reduce((s,t)=>s+t.compositeAnomaly,0)/targets.length;
  const maxAnomaly=Math.max(...targets.map(t=>t.compositeAnomaly));
  streamData.push(avgAnomaly);streamData.shift();
  streamAnomData.push(maxAnomaly);streamAnomData.shift();

  // Grid
  c.strokeStyle='rgba(0,180,255,.06)';c.lineWidth=.5;
  for(let i=0;i<5;i++){const y=i*(h/4);c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke()}

  // Labels
  c.font="8px 'Share Tech Mono'";c.fillStyle='rgba(0,180,255,.2)';
  c.fillText('1.0',2,12);c.fillText('0.5',2,h/2);c.fillText('0.0',2,h-4);

  // Threshold line
  c.strokeStyle='rgba(255,107,157,.2)';c.setLineDash([4,4]);
  c.beginPath();c.moveTo(0,h*.5);c.lineTo(w,h*.5);c.stroke();
  c.setLineDash([]);
  c.fillStyle='rgba(255,107,157,.3)';c.fillText('ANOMALY THRESHOLD',w-120,h*.5-4);

  // Average line
  c.beginPath();
  streamData.forEach((v,i)=>{
    const x=i*(w/200),y=h-v*h;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  });
  c.strokeStyle='rgba(0,200,255,.5)';c.lineWidth=1;c.stroke();

  // Max anomaly line
  c.beginPath();
  streamAnomData.forEach((v,i)=>{
    const x=i*(w/200),y=h-v*h;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  });
  c.strokeStyle='rgba(255,107,157,.6)';c.lineWidth=1.5;c.stroke();

  // Labels
  c.font="9px 'Share Tech Mono'";
  c.fillStyle='rgba(0,200,255,.5)';c.fillText('AVG',w-60,h-8);
  c.fillStyle='rgba(255,107,157,.6)';c.fillText('MAX',w-30,h-8);
}

// ══════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════
const mmCtx=document.getElementById('mmCanvas').getContext('2d');
function drawMinimap(){
  const c=mmCtx,w=160,h=160,cx=w/2,cy=h/2,sc=w/16;
  c.clearRect(0,0,w,h);c.fillStyle='rgba(3,10,28,.9)';c.fillRect(0,0,w,h);
  // Rings
  c.strokeStyle='rgba(0,180,255,.08)';c.lineWidth=.5;
  [2,4,6,8].forEach(r=>{c.beginPath();c.arc(cx,cy,r*sc*.9,0,PI2);c.stroke()});
  // Station
  c.fillStyle='#00d4ff';c.beginPath();c.arc(cx,cy,3,0,PI2);c.fill();
  // Sweep
  c.strokeStyle='rgba(0,200,255,.3)';c.lineWidth=1;c.beginPath();
  c.moveTo(cx,cy);c.lineTo(cx+sin(sweepAngle)*70,cy-cos(sweepAngle)*70);c.stroke();
  // Targets
  targets.filter(t=>t.visible).forEach(t=>{
    const tx=cx+sin(t.angle)*t.dist*70;
    const ty=cy-cos(t.angle)*t.dist*70;
    const isA=t.compositeAnomaly>0.5;
    c.fillStyle=isA?'#ff6b9d':'#66ccff';
    c.beginPath();c.arc(tx,ty,isA?3:2,0,PI2);c.fill();
  });
}
